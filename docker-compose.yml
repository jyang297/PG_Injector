services:
  db:
    image: pgvector/pgvector:pg16
    container_name: context-manager-pg
    environment:
      POSTGRES_DB: context_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./sql/02_retrieval.sql:/docker-entrypoint-initdb.d/02_retrieval.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d context_demo"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
